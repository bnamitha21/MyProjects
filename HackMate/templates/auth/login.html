{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 0.5rem;" class="text-gradient">Welcome back</h2>
        <p style="text-align: center; margin-bottom: 2rem;">Log in to find teammates and manage teams.</p>
        
        <form action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="enter email..." required>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Log In
            </button>
        </form>
        
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? 
            <a href="{{ url_for('auth.register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
